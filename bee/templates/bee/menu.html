{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spellcasting - Main Menu</title>
    <style>
        body {
            background-color: #282c34;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #introOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-out, visibility 1s;
        }
        #introVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .skip-intro-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 16px;
            font-size: 0.9rem;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            z-index: 10000;
        }
        .skip-intro-btn:hover { background-color: rgba(255, 255, 255, 0.4); }
        .container {
            text-align: center;
            background-color: #1e222b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
        }
        h1 { color: #b68f40; font-size: 2.5rem; margin-bottom: 10px; }
        .menu-subtitle { color: #aaa; font-size: 1.2rem; margin-bottom: 30px; }
        .difficulty-section { margin: 25px 0; }
        .difficulty-label { font-size: 1.1rem; color: #eee; margin-bottom: 10px; font-weight: bold; }
        .diff-btn {
            background-color: #3a3f4d;
            color: #ccc;
            padding: 10px 20px;
            font-size: 1rem;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s;
        }
        .diff-btn:hover { background-color: #4e5465; color: white; }
        .diff-btn.selected[data-diff="easy"] { background-color: #4caf50; color: white; border-color: #81c784; }
        .diff-btn.selected[data-diff="medium"] { background-color: #ff9800; color: white; border-color: #ffb74d; }
        .diff-btn.selected[data-diff="hard"] { background-color: #e53935; color: white; border-color: #ef5350; }
        .status-box { color: #ffeb3b; font-size: 1.2rem; min-height: 40px; margin-bottom: 20px; font-weight: bold; }
        button.action-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin: 10px;
            font-weight: bold;
        }
        button.action-btn:hover { background-color: #45a049; transform: scale(1.02); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="introOverlay">
    <video id="introVideo" autoplay muted playsinline>
        <source src="{% static 'bee/intro.mp4' %}" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <button class="skip-intro-btn" onclick="endIntroSequence()">SKIP INTRO</button>
</div>

<div class="container">
    <div id="menuScreen">
        <h1>SPELLCASTING</h1>
        <p class="menu-subtitle">A Voice-Controlled Spelling Adventure</p>
        
        <div id="difficultyWrapper" class="hidden">
            <div class="difficulty-section">
                <div class="difficulty-label">CHOOSE DIFFICULTY:</div>
                <button class="diff-btn" data-diff="easy" onclick="selectDifficulty('easy')">EASY</button>
                <button class="diff-btn" data-diff="medium" onclick="selectDifficulty('medium')">MEDIUM</button>
                <button class="diff-btn" data-diff="hard" onclick="selectDifficulty('hard')">HARD</button>
            </div>
        </div>

        <div style="margin: 20px 0;">
            <p style="color: #aaa; font-size: 1rem; line-height: 1.6;">
