<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spellcasting Battle</title>
    <style>
        body {
            background-color: #282c34;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background-color: #1e222b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
        }
        .battle-arena {
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .enemy-sprite {
            font-size: 5rem;
            min-height: 100px;
            margin-bottom: 10px;
            transition: transform 0.2s ease, opacity 0.5s ease;
        }
        .health-bar-container {
            width: 250px;
            height: 16px;
            background-color: #3a3f4d;
            border-radius: 8px;
            border: 2px solid #555;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .health-bar {
            width: 100%;
            height: 100%;
            background-color: #e53935;
            transition: width 0.3s ease-in-out;
        }
        .enemy-name {
            color: #ef5350;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        h1 { color: #b68f40; font-size: 2.5rem; margin-bottom: 10px; }
        .stats-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
            width: 100%;
        }
        .score-box { color: #4caf50; font-size: 1.5rem; font-weight: bold; }
        .timer-box { color: #e53935; font-size: 1.6rem; font-weight: bold; background: #2c1e21; padding: 5px 15px; border-radius: 6px; border: 1px solid #7a2022; }
        .hearts-box { font-size: 1.8rem; color: #f44336; letter-spacing: 5px; }
        .status-box { color: #ffeb3b; font-size: 1.2rem; min-height: 40px; margin-bottom: 20px; font-weight: bold; }
        .spelling-display {
            font-size: 3rem;
            letter-spacing: 8px;
            color: #00bcd4;
            margin: 30px 0;
            min-height: 70px;
            text-transform: uppercase;
            font-weight: bold;
        }
        button.action-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin: 10px;
            font-weight: bold;
        }
        button.action-btn:hover { background-color: #45a049; transform: scale(1.02); }
        button:disabled { background-color: #555 !important; cursor: not-allowed; transform: none !important; }

        @keyframes monsterDamage {
            0% { transform: scale(1) translateX(0); filter: brightness(1) drop-shadow(0 0 0 rgba(255,0,0,0)); }
            15% { transform: scale(1.3) translateX(-10px); filter: brightness(5) drop-shadow(0 0 15px #ff3333); }
            30% { transform: scale(1.1) translateX(10px); filter: brightness(5) drop-shadow(0 0 15px #fff); }
            45% { transform: scale(1.2) translateX(-8px); filter: brightness(3); }
            60% { transform: scale(1) translateX(8px); filter: brightness(2); }
            80% { transform: scale(1.1) translateX(-4px); filter: brightness(1.5); }
            100% { transform: scale(1) translateX(0); filter: brightness(1) drop-shadow(0 0 0 rgba(0,0,0,0)); }
        }
        @keyframes monsterAttack {
            0% { transform: translateY(0) scale(1); filter: sepia(0); }
            20% { transform: translateY(15px) scale(0.9); filter: sepia(1) hue-rotate(-50deg) saturate(5); } 
            40% { transform: translateY(-35px) scale(1.2); } 
            60% { transform: translateY(0) scale(1); }
            80% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }
        .monster-hit { animation: monsterDamage 0.5s ease-in-out forwards; }
        .monster-strike { animation: monsterAttack 0.4s ease-in-out forwards; }
    </style>
</head>
<body>

<div class="container">
    <div id="gameScreen">
        <h1>SPELLCASTING BATTLE</h1>
        
        <div class="stats-row">
            <div class="score-box">MONSTERS DEFEATED: <span id="score">0</span></div>
            <div class="timer-box">⏱️ <span id="timerDisplay">15</span>s</div>
            <div class="hearts-box" id="heartsDisplay">❤️ ❤️ ❤️</div>
        </div>

        <div class="battle-arena">
            <div id="enemyName" class="enemy-name">MINION</div>
            <div class="health-bar-container">
                <div id="enemyHealth" class="health-bar"></div>
            </div>
            <div id="enemySprite" class="enemy-sprite">👻</div>
        </div>

        <div style="background: #15181f; border: 2px dashed #b68f40; padding: 15px; border-radius: 8px; margin: 15px 0;">
            <div style="font-size: 0.8rem; color: #aaa; letter-spacing: 2px;">READ ALOUD TO CAST:</div>
            <div id="targetSpellDisplay" style="font-size: 2.2rem; color: #ffeb3b; font-weight: bold; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px;">---</div>
        </div>

        <div id="battleStatus" class="status-box">Preparing spell...</div>
        <div id="spellingDisplay" class="spelling-display">---</div>

        <button class="action-btn" style="background-color: #9c27b0;" id="repeatBtn" onclick="repeatWord()">HOW DO I CAST IT?</button>
        <button class="action-btn" style="background-color: #ff9800;" id="clearBtn" onclick="clearSpelling()">RESET INCANTATION</button>
        <button class="action-btn" style="background-color: #757575;" id="skipBtn" onclick="nextWord()">FLEE BATTLE</button>
        
        <button class="action-btn" style="background-color: #d32f2f; display: block; margin: 30px auto 0 auto; font-size: 0.9rem; padding: 8px 16px;" id="exitBtn" onclick="returnToMenu()">RETREAT TO MENU</button>
    </div>
</div>

<script>
    const difficultyWords = {
        easy: ["lumos", "nox", "incendio", "protego", "silencio", "reducto", "accio", "diffindo", "aguamenti", "evanesco", "imperio", "revelio", "tergeo", "finite", "relashio", "alohomora", "morsmordre", "avis", "crucio", "enervate"],
        medium: ["expecto patronum", "sectumsempra", "expelliarmus", "wingardium leviosa", "arresto momentum", "petrificus totalus", "riddikulus", "confundo", "avada kedavra", "priori incantatem", "legilimens", "obliviate", "cave inimicum", "vade retro", "ignis fatuus", "corpus inane", "magna veritas", "aqua eructo", "salvio hexia", "exura vita"],
        hard: ["piertotum locomotor", "lacarnum inflamarae", "serpensortia veni", "locomotor mortis", "tarantallegra passus", "furnunculus maxima", "densaugeo cresco", "deletrius pulveris", "impedimenta obstructo", "incarcerous vincula", "mobilicorpus movere", "muffliato surdus", "oppugno inimicos", "sonorus maxima", "quietus deminuere", "waddiwasi projectum", "homenum revelio", "fianto duri", "partis temporus", "vulnera sanentur"]
    };

    const monsterNames = ["Shadow Demon", "Wraith", "Abyssal Ghoul", "Banshee", "Undead Skeleton", "Poltergeist"];
    const monsterSprites = ["👿", "👻", "👹", "💀", "🧛", "🧟"];

    // Read chosen settings out from parameters passed down across paths
    const urlParams = new URLSearchParams(window.location.search);
    let selectedDifficultySetting = urlParams.get('difficulty') || 'easy';

    let wordsPool = [];
    let currentWord = "";
    let accumulatedSpelling = ""; 
    let score = 0;
    let lives = 3;
    let gameOver = false;
    let timeLeft = 15;
    let countdownInterval = null;
    let shouldBattleRun = false;

    const synth = window.speechSynthesis;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let battleRecognition = null;

    if (SpeechRecognition) {
        battleRecognition = new SpeechRecognition();
        battleRecognition.continuous = true;
        battleRecognition.interimResults = true;
        battleRecognition.lang = 'en-US';
    }

    // Auto-ignition trigger run sequence inside the gameplay arena boundaries instantly 
    window.onload = function() {
        startGame();
    };

    function startGame() {
        wordsPool = [...difficultyWords[selectedDifficultySetting]];
        score = 0;
        lives = 3;
        gameOver = false;
        accumulatedSpelling = "";

        document.getElementById('score').innerText = score;
        renderHearts();
        
        setTimeout(nextWord, 500);
        setTimeout(startListening, 2000); 
    }

    function returnToMenu() {
        stopTimer();
        shouldBattleRun = false;
        try { battleRecognition.stop(); } catch(e) {}
        if (synth.speaking) synth.cancel();
        // Return browser back tracking to your menu endpoint path base
        window.location.href = '/'; 
    }

    function speak(text) {
        if (synth.speaking) synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.95;
        synth.speak(utterance);
    }

    function renderHearts() {
        let heartsStr = "";
        for (let i = 0; i < 3; i++) { heartsStr += (i < lives) ? "❤️ " : "🖤 "; }
        document.getElementById('heartsDisplay').innerText = heartsStr;
    }

    function startTimer() {
        stopTimer();
        timeLeft = 15;
        document.getElementById('timerDisplay').innerText = timeLeft;
        
        countdownInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timerDisplay').innerText = timeLeft;
            if (timeLeft <= 0) {
                stopTimer();
                handleTimeOut();
            }
        }, 1000);
    }

    function stopTimer() { if (countdownInterval) clearInterval(countdownInterval); }

    function handleTimeOut() {
        if (gameOver) return;
        lives--;
        renderHearts();
        try { battleRecognition.stop(); } catch(e) {}

        if (lives <= 0) {
            triggerGameOver();
        } else {
            document.getElementById('battleStatus').innerText = "⏰ TIME OUT! Heart lost.";
            document.getElementById('spellingDisplay').style.color = "#f44336";
            speak("Time expired!");
            
            setTimeout(nextWord, 3000);
            setTimeout(startListening, 5500);
        }
    }

    function nextWord() {
        if (gameOver) return;

        if (wordsPool.length === 0) {
            gameOver = true;
            stopTimer();
            document.getElementById('battleStatus').innerText = "🏆 VICTORY! All targets defeated!";
            document.getElementById('targetSpellDisplay').innerText = "CLEAR";
            document.getElementById('spellingDisplay').innerText = "VICTORY";
            document.getElementById('spellingDisplay').style.color = "#4caf50";
            disableButtons();
            speak("Dungeon complete.");
            return;
        }

        document.getElementById('enemyHealth').style.width = "100%";
        const randomMonsterIdx = Math.floor(Math.random() * monsterSprites.length);
        document.getElementById('enemyName').innerText = monsterNames[randomMonsterIdx].toUpperCase();
        document.getElementById('enemySprite').innerText = monsterSprites[randomMonsterIdx];

        const randomIndex = Math.floor(Math.random() * wordsPool.length);
        currentWord = wordsPool[randomIndex];
        accumulatedSpelling = "";
        
        document.getElementById('targetSpellDisplay').innerText = currentWord;
        document.getElementById('spellingDisplay').innerText = "---";
        document.getElementById('battleStatus').innerText = "An enemy approaches! Cast your spell.";
        document.getElementById('spellingDisplay').style.color = "#00bcd4"; 
        
        speak("Spell sequence " + currentWord);
    }

    function repeatWord() {
        if (gameOver) return;
        speak("Spell target sequence " + currentWord);
    }

    function triggerGameOver() {
        gameOver = true;
        stopTimer();
        shouldBattleRun = false;
        try { battleRecognition.stop(); } catch(e) {}
        document.getElementById('battleStatus').innerText = "❌ GAME OVER!";
        document.getElementById('spellingDisplay').innerText = "GAME OVER";
        document.getElementById('spellingDisplay').style.color = "#f44336";
        disableButtons();
        speak("Defeated.");
    }

    function disableButtons() { 
        document.getElementById('repeatBtn').disabled = true;
        document.getElementById('clearBtn').disabled = true;
        document.getElementById('skipBtn').disabled = true;
    }

    // Modified this logic so the system automatically clears the display on every new spell attempt
    function startListening() {
        if (gameOver) return;
        document.getElementById('battleStatus').innerText = "🎙️ Listening Live... Cast spell!";
        clearSpelling(); // Automatically flushes input boxes clean when a new word activates
        shouldBattleRun = true;
        startTimer(); 
        try { battleRecognition.start(); } catch(err) {}
    }

    function clearSpelling() {
        accumulatedSpelling = "";
        document.getElementById('spellingDisplay').innerText = "---";
        document.getElementById('spellingDisplay').style.color = "#00bcd4"; 
    }

    if (battleRecognition) {
        battleRecognition.onresult = function(event) {
            if (gameOver || !shouldBattleRun) return;

            let interimTranscript = "";
            let newlyFinalizedText = "";

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                let chunk = event.results[i][0].transcript.toLowerCase().replace(/[^a-z]/g, "");
                if (event.results[i].isFinal) newlyFinalizedText += chunk;
                else interimTranscript += chunk;
            }

            accumulatedSpelling += newlyFinalizedText;
            let liveTotalSpelling = accumulatedSpelling + interimTranscript;
            
            document.getElementById('spellingDisplay').innerText = liveTotalSpelling.split("").join(" ");
            let processedTarget = currentWord.replace(/[^a-z]/g, "");

            if (liveTotalSpelling === processedTarget) {
                score++;
                stopTimer();
                shouldBattleRun = false;
                
                const sprite = document.getElementById('enemySprite');
                sprite.classList.add('monster-hit');
                setTimeout(() => { sprite.classList.remove('monster-hit'); }, 500); 

                document.getElementById('enemyHealth').style.width = "0%";
                document.getElementById('score').innerText = score;
                document.getElementById('battleStatus').innerText = "💥 Critical Hit! Enemy defeated!";
                document.getElementById('spellingDisplay').style.color = "#4caf50";
                speak("Cast complete!");
                
                wordsPool = wordsPool.filter(w => w !== currentWord);
                submitScoreToDjango(score);
                try { battleRecognition.stop(); } catch(e) {}
                
                setTimeout(nextWord, 2000);
                setTimeout(startListening, 4500); 
            }
            else if (accumulatedSpelling.length >= processedTarget.length && accumulatedSpelling !== processedTarget) {
                lives--;
                stopTimer();
                renderHearts();
                shouldBattleRun = false;
                try { battleRecognition.stop(); } catch(e) {}

                const sprite = document.getElementById('enemySprite');
                sprite.classList.add('monster-strike');
                setTimeout(() => { sprite.classList.remove('monster-strike'); }, 400);

                if (lives <= 0) {
                    triggerGameOver();
                } else {
                    document.getElementById('battleStatus').innerText = "Wrong spelling! Heart lost.";
                    document.getElementById('spellingDisplay').style.color = "#f44336"; 
                    speak("Interrupted.");
                    
                    setTimeout(nextWord, 3000);
                    setTimeout(startListening, 5500);
                }
            }
        };

        battleRecognition.onend = function() {
            if (shouldBattleRun && !gameOver && timeLeft > 0) {
                setTimeout(() => { try { battleRecognition.start(); } catch(e) {} }, 300);
            }
        };
    }

    function submitScoreToDjango(currentScore) {
        fetch('/api/save-score/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ name: '{{ player_name }}', score: currentScore, difficulty: selectedDifficultySetting })
        })
        .then(response => response.json())
        .catch(err => console.error("Scores sync error:", err));
    }
</script>
</body>
</html>
