<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spellcasting – Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@600&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C8972A; --gold-lt: #E8B84B;
      --blue-glow: #4FC3F7; --dark-bg: #1A1E24;
      --card-bg: #22272E; --card-border: #2E3A4A;
      --text: #D0D8E0; --muted: #7A8A9A; --error: #E57373;
    }
    html, body { height: 100%; background: var(--dark-bg); font-family: 'Raleway', sans-serif; color: var(--text); overflow-y: auto; }
    #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .lightning-layer { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .bolt {
      position: absolute; width: 2px;
      background: linear-gradient(to bottom, transparent, var(--blue-glow), transparent);
      border-radius: 2px; filter: blur(1px) drop-shadow(0 0 6px var(--blue-glow));
      animation: bolt-flash linear infinite; opacity: 0;
    }
    @keyframes bolt-flash {
      0%   { opacity: 0; transform: scaleY(0) translateX(0); }
      5%   { opacity: .9; transform: scaleY(1) translateX(-4px); }
      10%  { opacity: .6; transform: scaleY(1) translateX(3px); }
      15%  { opacity: .8; transform: scaleY(1) translateX(-2px); }
      20%  { opacity: 0; } 100% { opacity: 0; }
    }
    .page {
      position: relative; z-index: 10; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 20px;
    }
    .site-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      color: var(--gold); letter-spacing: 4px;
      text-transform: uppercase; margin-bottom: 4px;
      animation: titlePulse 3s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%,100% { text-shadow: 0 0 20px rgba(200,151,42,.6), 0 0 60px rgba(79,195,247,.25); }
      50%      { text-shadow: 0 0 35px rgba(200,151,42,.9), 0 0 90px rgba(79,195,247,.5); }
    }
    .site-sub {
      font-family: 'Cinzel', serif; font-size: .78rem;
      color: var(--muted); letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 36px;
    }
    .card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 40px 42px 36px;
      width: 100%; max-width: 460px;
      box-shadow: 0 0 0 1px rgba(79,195,247,.08), 0 20px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
      animation: cardIn .6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-heading {
      font-family: 'Cinzel', serif; font-size: 1rem;
      color: var(--gold-lt); letter-spacing: 2px;
      text-transform: uppercase; text-align: center; margin-bottom: 28px;
    }
    .error-box {
      background: rgba(229,115,115,.1); border: 1px solid rgba(229,115,115,.4);
      border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
      font-size: .82rem; color: var(--error); font-weight: 700;
      text-align: center; letter-spacing: .5px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: .72rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1.5px; margin-bottom: 8px;
    }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 12px 16px; background: #1A1E24;
      border: 1px solid var(--card-border); border-radius: 8px;
      font-family: 'Raleway', sans-serif; font-size: .95rem;
      font-weight: 600; color: #E8EDF2; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus { border-color: rgba(79,195,247,.5); box-shadow: 0 0 0 3px rgba(79,195,247,.1); }
    input::placeholder { color: #3A4A5A; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1rem; padding: 0; transition: color .2s;
    }
    .pw-toggle:hover { color: var(--blue-glow); }
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--card-border), transparent);
      margin: 24px 0;
    }
    .btn-register {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #B8851E 0%, #D4A030 50%, #B8851E 100%);
      border: none; border-radius: 8px; font-family: 'Cinzel', serif;
      font-size: 1rem; font-weight: 600; letter-spacing: 2.5px;
      text-transform: uppercase; color: #1A1206; cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,151,42,.35);
      transition: transform .15s, box-shadow .15s, filter .15s;
      position: relative; overflow: hidden;
    }
    .btn-register::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 60%);
      border-radius: 8px;
    }
    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(200,151,42,.5), 0 0 40px rgba(79,195,247,.15);
      filter: brightness(1.08);
    }
    .btn-register:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(200,151,42,.3); }
    .card-footer {
      text-align: center; margin-top: 20px;
      font-size: .78rem; color: var(--muted); letter-spacing: .5px;
    }
    .card-footer a { color: var(--gold-lt); text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="lightning-layer" id="lightningLayer"></div>

<div class="page">
  <div class="site-title">Spellcasting</div>
  <div class="site-sub">A Voice-Controlled Spelling Adventure</div>

  <div class="card">
    <div class="card-heading">✨ Create Your Account</div>

    {% if error %}
    <div class="error-box">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Choose a username"
               value="{{ request.POST.username|default:'' }}"
               autocomplete="username" required autofocus/>
      </div>

      <div class="field">
        <label for="nickname">Nickname</label>
        <input type="text" id="nickname" name="nickname"
               placeholder="Your display name in game"
               value="{{ request.POST.nickname|default:'' }}"
               autocomplete="off" required/>
      </div>

      <div class="field">
        <label for="password1">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password1" name="password1"
                 placeholder="Create a password" required/>
          <button type="button" class="pw-toggle" onclick="togglePw('password1', this)">👁</button>
        </div>
      </div>

      <div class="field">
        <label for="password2">Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="password2" name="password2"
                 placeholder="Repeat your password" required/>
          <button type="button" class="pw-toggle" onclick="togglePw('password2', this)">👁</button>
        </div>
      </div>

      <div class="divider"></div>
      <button type="submit" class="btn-register">Join the Arena</button>
    </form>
  </div>

  <div class="card-footer" style="margin-top:16px;">
    Already have an account? <a href="/login/">Sign in here</a>
  </div>
</div>

<script>
(function() {
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let W, H, stars = [];
  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
    stars = Array.from({length: 180}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.4+.2,
      a: Math.random(), da: (Math.random()-.5)*.008
    }));
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    stars.forEach(s => {
      s.a = Math.max(.05, Math.min(1, s.a + s.da));
      if (s.a <= .05 || s.a >= 1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,220,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize(); draw();
})();

(function() {
  const layer = document.getElementById('lightningLayer');
  function spawnBolt() {
    const el = document.createElement('div');
    el.className = 'bolt';
    const h = 80 + Math.random() * 200;
    el.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*60}%;
      height:${h}px;
      transform-origin: top center;
      animation-duration:${1.5 + Math.random()*2}s;
      animation-delay:${Math.random()*4}s;
      opacity: 0;
    `;
    layer.appendChild(el);
    setTimeout(() => el.remove(), (3.5 + Math.random()*2) * 1000);
  }
  setInterval(spawnBolt, 400);
  for (let i = 0; i < 6; i++) spawnBolt();
})();

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}
</script>
</body>
</html>
